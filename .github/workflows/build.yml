name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Regenerate gradle wrapper
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
          if [ ! -f "$JAR" ] || [ "$SIZE" -lt 50000 ]; then
            curl -s "https://get.sdkman.io" | bash
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install gradle 8.7
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.p12
          ls -la keystore.p12

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        run: |
          # إيجاد apksigner
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS_DIR"

          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          SIGNED="app/build/outputs/apk/release/salat-muslim-pro.apk"

          echo "Signing: $UNSIGNED"

          $BUILD_TOOLS_DIR/apksigner sign \
            --ks keystore.p12 \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$UNSIGNED"

          # تحقق
          $BUILD_TOOLS_DIR/apksigner verify --verbose "$SIGNED"
          echo "APK_PATH=$SIGNED" >> $GITHUB_ENV

      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: salat-muslim-pro-signed
          path: ${{ env.APK_PATH }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "النسخة 1.0.${{ github.run_number }}"
          body: |
            🕌 تطبيق صلات مسلم برو — نسخة موقّعة
            🤲 إهداء إلى روح محمد عبد العظيم الطويل رحمه الله
          files: ${{ env.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
